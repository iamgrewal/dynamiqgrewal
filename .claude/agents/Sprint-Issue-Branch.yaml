# .agent/workflows/Sprint-Issue-Branch.yaml

name: "Sprint Issue + Branch Setup"
description: "Creates a GitHub issue and development branch aligned with a sprint feature"

inputs:
  - name: issue_id_slug
    description: "A slug like 'issue-123-sprint2-resume-upload'"
    required: true
  - name: issue_description
    description: "Markdown description of the sprint issue"
    required: true

actions:
  - name: Create GitHub Issue
    uses: github/create-issue
    with:
      title: "${{ inputs.issue_id_slug }}"
      body: "${{ inputs.issue_description }}"
    id: create_issue

  - name: Extract Branch Name
    run: |
      echo "## Extracting branch name from slug"
      echo "BRANCH_NAME=${{ inputs.issue_id_slug }}" >> $GITHUB_ENV

  - name: Create Branch from Issue
    uses: github/create-branch
    with:
      branch: "${{ env.BRANCH_NAME }}"
      base: "main"  # or your default branch
      issue: "${{ steps.create_issue.outputs.issue_number }}"

  - name: Confirm
    run: |
      echo "Branch '${{ env.BRANCH_NAME }}' created and linked to issue #${{ steps.create_issue.outputs.issue_number }}"
