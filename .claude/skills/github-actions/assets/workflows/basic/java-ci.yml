# Java CI/CD Pipeline
# Complete continuous integration for Java/Maven/Gradle projects
# Features: Multi-version builds, security scanning, deployment to Maven Central

name: Java CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # Weekly dependency check

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect build system
  detect:
    name: Detect Build System
    runs-on: ubuntu-latest
    outputs:
      build-tool: ${{ steps.detect.outputs.build-tool }}
      java-version: ${{ steps.detect.outputs.java-version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect build tool
        id: detect
        run: |
          if [ -f "pom.xml" ]; then
            echo "build-tool=maven" >> $GITHUB_OUTPUT
            echo "Detected Maven project"
          elif [ -f "build.gradle" ] || [ -f "build.gradle.kts" ]; then
            echo "build-tool=gradle" >> $GITHUB_OUTPUT
            echo "Detected Gradle project"
          else
            echo "build-tool=unknown" >> $GITHUB_OUTPUT
            echo "No build tool detected"
          fi

          # Detect Java version from pom.xml or build.gradle
          if [ -f "pom.xml" ]; then
            version=$(grep -m 1 "maven.compiler.source\|java.version" pom.xml | sed -n 's/.*>\([0-9.]*\)<.*/\1/p' | head -1)
            echo "java-version=${version:-17}" >> $GITHUB_OUTPUT
          elif [ -f "build.gradle" ] || [ -f "build.gradle.kts" ]; then
            version=$(grep -m 1 "sourceCompatibility\|JavaVersion.VERSION" build.gradle* | sed -n 's/.*\([0-9][0-9]\).*/\1/p' | head -1)
            echo "java-version=${version:-17}" >> $GITHUB_OUTPUT
          else
            echo "java-version=17" >> $GITHUB_OUTPUT
          fi

  # Maven build and test
  maven-build:
    name: Maven Build (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.build-tool == 'maven'

    strategy:
      fail-fast: false
      matrix:
        java: ['11', '17', '21']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn -B -DskipTests clean compile

      - name: Run tests
        run: mvn -B test

      - name: Generate test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Maven Tests (Java ${{ matrix.java }})
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true

      - name: Check code coverage with JaCoCo
        run: mvn jacoco:report || echo "JaCoCo not configured"

      - name: Upload coverage to Codecov
        if: matrix.java == 17
        uses: codecov/codecov-action@v4
        with:
          file: target/site/jacoco/jacoco.xml
          flags: unittests
          name: codecov-umbrella

      - name: Run security check with OWASP Dependency-Check
        run: mvn org.owasp:dependency-check-maven:check || echo "Dependency check not configured"
        continue-on-error: true

  # Gradle build and test
  gradle-build:
    name: Gradle Build (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.build-tool == 'gradle'

    strategy:
      fail-fast: false
      matrix:
        java: ['11', '17', '21']
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        if: runner.os == 'Linux'
        run: chmod +x gradlew || true

      - name: Build with Gradle
        run: ./gradlew build --no-daemon || gradle build --no-daemon

      - name: Run tests
        run: ./gradlew test --no-daemon || gradle test --no-daemon

      - name: Generate test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Gradle Tests (Java ${{ matrix.java }})
          path: build/test-results/test/*.xml
          reporter: java-junit
          fail-on-error: true

      - name: Check code coverage
        run: ./gradlew jacocoTestReport || echo "JaCoCo not configured"

      - name: Upload coverage to Codecov
        if: matrix.java == 17 && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          file: build/reports/jacoco/test/jacocoTestReport.xml
          flags: unittests

      - name: Run Gradle dependency check
        run: ./gradlew dependencyCheckAnalyze || echo "Dependency check not configured"
        continue-on-error: true

  # Code quality and static analysis
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: detect

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run SonarCloud scan
        if: needs.detect.outputs.build-tool == 'maven'
        run: mvn -B sonar:sonar -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} || echo "SonarCloud not configured"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

      - name: Run SpotBugs
        if: needs.detect.outputs.build-tool == 'maven'
        run: mvn spotbugs:check || echo "SpotBugs not configured"
        continue-on-error: true

      - name: Run Checkstyle
        if: needs.detect.outputs.build-tool == 'maven'
        run: mvn checkstyle:check || echo "Checkstyle not configured"
        continue-on-error: true

  # Security scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: detect

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Snyk security scan
        if: needs.detect.outputs.build-tool == 'maven'
        uses: snyk/actions/maven@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk security scan (Gradle)
        if: needs.detect.outputs.build-tool == 'gradle'
        uses: snyk/actions/gradle@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  # Build and package
  package:
    name: Package
    runs-on: ubuntu-latest
    needs: [detect, maven-build, gradle-build, security]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ needs.detect.outputs.java-version }}
          distribution: 'temurin'

      - name: Package with Maven
        if: needs.detect.outputs.build-tool == 'maven'
        run: mvn -B package -DskipTests

      - name: Package with Gradle
        if: needs.detect.outputs.build-tool == 'gradle'
        run: ./gradlew assemble || gradle assemble

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-artifacts
          path: |
            target/*.jar
            target/*.war
            build/libs/*.jar
          retention-days: 7

  # Deploy to Maven Central (on release)
  deploy-maven:
    name: Deploy to Maven Central
    runs-on: ubuntu-latest
    needs: [detect, package]
    if: needs.detect.outputs.build-tool == 'maven' && startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Publish to Maven Central
        run: mvn deploy -DskipTests -Prelease
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}

  # Docker build for Spring Boot applications
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [package]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: package-artifacts

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
