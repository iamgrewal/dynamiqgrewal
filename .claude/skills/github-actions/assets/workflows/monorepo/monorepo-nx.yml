# Nx Monorepo CI/CD Pipeline
# Optimized CI for Nx workspaces
# Features: Affected graph, distributed caching, parallel execution

name: Nx Monorepo CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Determine affected projects
  affected:
    name: Detect Affected
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.affected.outputs.apps }}
      libs: ${{ steps.affected.outputs.libs }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive affected projects
        id: affected
        uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: main

      - name: Show affected
        run: |
          npx nx show projects --affected --json

  # Build affected apps
  build:
    name: Build ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: affected

    strategy:
      fail-fast: false
      matrix:
        app:
          - ${{ fromJson(needs.affected.outputs.apps) }}
        exclude:
          - app: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build ${{ matrix.app }}
        run: npx nx run ${{ matrix.app }}:build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-dist
          path: dist/${{ matrix.app }}

  # Test affected projects
  test:
    name: Test Affected
    runs-on: ubuntu-latest
    needs: affected

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run affected tests
        run: npx nx run-many --target=test --all --affected --parallel

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unittests
